<!DOCTYPE html><html lang="en"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <link rel="stylesheet" href="css/style.min.css">    <title>PowerYou</title></head><body>    <div class="wrapper">        <header class="header">    <div class="container">        <div class="header__content">            <div class="header__logo">                <picture><source srcset="img/logo.webp" type="image/webp"><img src="img/logo.png" alt="logo"></picture>            </div>        </div>    </div></header>        <div class="root"></div>        <div class="main-screen">            <div class="main-screen__bg ibg">                <picture><source srcset="img/bg.webp" type="image/webp"><img src="img/bg.png" alt="картинка"></picture>            </div>        </div>        <div class="page">            <div class="welcome-block">                <div class="container">                    <div class="welcome-block__content">                        <h1 class="welcome-block__title">                            Hoppala, was ist jetzt passiert?                        </h1>                        <div class="welcome-block__people">                            <picture><source srcset="img/people.webp" type="image/webp"><img src="img/people.png" alt="picture"></picture>                        </div>                        <div class="welcome-block__stics">                            <picture><source srcset="img/stics.webp" type="image/webp"><img src="img/stics.png" alt="picture"></picture>                        </div>                        <h2 class="welcome-block__subtitle">                            <p>                                Bald sind wir online!                            </p>                            <p>                                Versprochen!                            </p>                        </h2>                        <button class="welcome-block__button">                            Guten Appetit                        </button>                    </div>                </div>            </div>        </div>    </div>    <script src="js/script.min.js"></script></body></html>
